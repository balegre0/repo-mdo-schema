syntax = "proto3";
package common.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

message Hash {
  enum Algorithm {
    ALGORITHM_UNSPECIFIED = 0;
    ALGORITHM_SHA256 = 1;
    ALGORITHM_SHA512 = 2;
    ALGORITHM_BLAKE3 = 3;
  }
  optional Algorithm algorithm = 1;
  optional bytes value = 2 [(buf.validate.field).bytes = {
    min_len: 32
    max_len: 64
  }];
}

message Signature {
  enum Algorithm {
    ALGORITHM_UNSPECIFIED = 0;
    ALGORITHM_ED25519 = 1;
    ALGORITHM_ECDSA_P256 = 2;
  }
  optional Algorithm algorithm = 1;
  optional string id = 2 [(buf.validate.field).string.max_len = 64];
  optional bytes key_data = 3 [(buf.validate.field).bytes.max_len = 256];
}

message MerkleRoot {
  optional Hash hash = 1;
  optional Hash previous_root = 2;
  optional google.protobuf.Timestamp timestamp = 3;
  optional uint64 tree_size = 4;
}

enum HashAlgorithm {
  HASH_ALGORITHM_UNSPECIFIED = 0;
  HASH_ALGORITHM_SHA256 = 1;
  HASH_ALGORITHM_SHA512 = 2;
  HASH_ALGORITHM_BLAKE3 = 3;
}

message Hmac {
  optional HashAlgorithm algorithm = 1;
  optional bytes value = 2 [(buf.validate.field).bytes.max_len = 64];
}
