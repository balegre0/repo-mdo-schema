syntax = "proto3";
package common.v1;

import "buf/validate/validate.proto";

message CursorPagionation {
  optional uint32 limit = 1 [(buf.validate.field).uint32 = {
    gte: 1
    lte: 100
  }];
  optional string cursor = 2 [(buf.validate.field).string.max_len = 1024];
  optional string sort_field = 3 [(buf.validate.field).string.max_len = 64];
  optional bool sort_desc = 4;
}

message PaginationResponse {
  optional string next_cursor = 1 [(buf.validate.field).string.max_len = 1024];
  optional uint64 total_estimate = 2;
}
