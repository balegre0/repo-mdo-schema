syntax = "proto3";
package common.v1;

import "buf/validate/validate.proto";
import "common/v1/base.proto";

message HealthReport {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_HEALTHY = 1;
    STATUS_DEGRADED = 2;
    STATUS_UNHEALTHY = 3;
    STATUS_MAINTENANCE = 4;
  }
  optional Status status = 1;
  optional uint64 uptime_seconds = 2;
  optional string version = 3 [(buf.validate.field).string.max_len = 32];
  optional bytes server_signature = 4 [(buf.validate.field).bytes.max_len = 256];
  optional Timestamp timestamp = 5;
}
