syntax = "proto3";
package common.v1;

import "buf/validate/validate.proto";
import "common/v1/base.proto";
import "common/v1/crypto.proto";

enum KdfAlgorithm {
  KDF_ALGORITHM_UNSPECIFIED = 0;
  KDF_ALGORITHM_HKDF_SHA256 = 1;
  KDF_ALGORITHM_PBKDF2_SHA512 = 2;
  KDF_ALGORITHM_ARGON2ID = 3;
}

message UserEncryptedPayload {
  optional bytes ephemeral_public_key = 1 [(buf.validate.field).bytes.max_len = 32];
  optional bytes ciphertext = 2 [(buf.validate.field).bytes.max_len = 65536];
  optional Hash key_commitment = 3;
  optional uint32 version = 4 [(buf.validate.field).uint32.const = 1];
  optional KdfAlgorithm kdf_algorithm = 5;
}

message HighSecurityToken {
  optional string token = 1 [(buf.validate.field).string.max_len = 128];
  optional Timestamp expires_at = 2;
  optional string purpose = 3 [(buf.validate.field).string.max_len = 64];
  optional Signature signature = 4;
}

message MerkleEvent {
  optional Hash prev_hash = 1;
  optional Signature signature = 2;
  optional Timestamp timestamp = 3;
  optional Hash data_hash = 4;
}

message ProofOfWork {
  optional bytes nonce = 1 [(buf.validate.field).bytes.max_len = 64];
  optional bytes solution = 2 [(buf.validate.field).bytes.max_len = 64];
  optional uint32 difficulty = 3;
}

message ZKProof {
  optional bytes proof_data = 1;
  repeated bytes public_inputs = 2 [(buf.validate.field).repeated.max_items = 10];
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TYPE_GROTH16 = 1;
    TYPE_PLONK = 2;
    TYPE_BULLETPROOFS = 3;
  }
  optional Type proof_type = 3;
}
