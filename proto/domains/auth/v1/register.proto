syntax = "proto3";

package domains.auth.v1;

import "buf/validate/validate.proto";
import "common/v1/base.proto";
import "common/v1/types.proto";
import "domains/auth/v1/types.proto";
import "google/protobuf/timestamp.proto";

// ...
service RegisterService {
  // ...
  rpc Register(RegisterRequest) returns (RegisterResponse);
  // ...
  rpc CheckAvailability(CheckAvailabilityRequest) returns (CheckAvailabilityResponse);
  // ...
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);
  // ...
  rpc ResendVerificationEmail(ResendVerificationEmailRequest) returns (ResendVerificationEmailResponse);
}

// ...
message RegisterRequest {
  // ...
  string verification_token = 1 [(buf.validate.field).string = {
    min_len: 32
    max_len: 128
  }];

  // ...
  string email = 2 [(buf.validate.field).string = {
    email: true
    min_len: 3
    max_len: 254
  }];

  // ...
  common.v1.DominicanPhone phone = 3;

  // ...
  bytes password_hash = 4 [(buf.validate.field).bytes = {
    min_len: 32
    max_len: 64
  }];

  // ...
  bool accept_terms = 5;

  // ...
  bool accept_privacy = 6;

  // ...
  string device_id = 7 [(buf.validate.field).string.max_len = 128];

  // ...
  string idempotency_key = 8 [(buf.validate.field).string = {
    min_len: 16
    max_len: 64
  }];

  // ...
  common.v1.ClientMetadata client_metadata = 9;

  // ...
  option (buf.validate.message).cel = {
    id: "register.terms_required"
    message: "terms and privacy policy must be accepted"
    expression: "this.accept_terms && this.accept_privacy"
  };
}

// ...
message RegisterResponse {
  // ...
  uint64 user_id = 1;

  // ...
  common.v1.VerifiedLevel verified_level = 2;

  // ...
  bool requires_mfa = 3;

  // ...
  google.protobuf.Timestamp created_at = 4;

  // ...
  repeated PendingAction pending_actions = 5 [(buf.validate.field).repeated = {
    max_items: 8
    items: {
      enum: {defined_only: true}
    }
  }];
}

// ...
message CheckAvailabilityRequest {
  // ...
  oneof identifier {
    // ...
    string email = 1 [(buf.validate.field).string.max_len = 254];
    // ...
    common.v1.DominicanPhone phone = 2;
  }
}

// ...
message CheckAvailabilityResponse {
  // ...
  bool available = 1;

  // ...
  AccountStatus account_status = 2 [(buf.validate.field).enum = {defined_only: true}];
}

// ...
message VerifyEmailRequest {
  // ...
  string token = 1 [(buf.validate.field).string = {
    min_len: 32
    max_len: 256
  }];
}

// ...
message VerifyEmailResponse {
  // ...
  bool verified = 1;

  // ...
  google.protobuf.Timestamp verified_at = 2;
}

// ...
message ResendVerificationEmailRequest {
  // ...
  string email = 1 [(buf.validate.field).string = {
    email: true
    max_len: 254
  }];

  // ...
  string idempotency_key = 2 [(buf.validate.field).string = {
    min_len: 16
    max_len: 64
  }];
}

// ...
message ResendVerificationEmailResponse {
  // ...
  bool sent = 1;

  // ...
  google.protobuf.Timestamp expires_at = 2;
}
