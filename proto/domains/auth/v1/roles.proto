syntax = "proto3";

package domains.auth.v1;

import "buf/validate/validate.proto";
import "common/v1/base.proto";
import "common/v1/pagination.proto";
import "common/v1/security.proto";
import "common/v1/types.proto";
import "domains/auth/v1/types.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "buf.build/mejorando/api/gen/go/domains/auth/v1;authv1";

// ...
service RolesService {
  // ...
  rpc GetUserRoles(GetUserRolesRequest) returns (GetUserRolesResponse) {
    option (google.api.http) = {get: "/v1/roles/user/{target_user_id}"};
  }
  // ...
  rpc AssignRole(AssignRoleRequest) returns (AssignRoleResponse) {
    option (google.api.http) = {
      post: "/v1/roles/assign"
      body: "*"
    };
  }
  // ...
  rpc RemoveRole(RemoveRoleRequest) returns (RemoveRoleResponse) {
    option (google.api.http) = {
      post: "/v1/roles/remove"
      body: "*"
    };
  }
  // ...
  rpc ListAssignableRoles(ListAssignableRolesRequest) returns (ListAssignableRolesResponse) {
    option (google.api.http) = {get: "/v1/roles/assignable"};
  }
}

// ...
message RoleAssignment {
  // ...
  Role role = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // ...
  google.protobuf.Timestamp assigned_at = 2;

  // ...
  uint64 assigned_by = 3;

  // ...
  google.protobuf.Timestamp expires_at = 4;

  // ...
  bool is_temporary = 5;

  // ...
  // ...
  repeated uint32 province_scope = 6 [(buf.validate.field).repeated = {
    max_items: 32
    items: {
      uint32: {
        gte: 1
        lte: 32
      }
    }
  }];

  // ...
  option (buf.validate.message).cel = {
    id: "role.province_scope_required_for_non_superadmin"
    message: "province_scope is required for roles below SUPER_ADMIN"
    expression: "this.role == domains.auth.v1.Role.ROLE_SUPER_ADMIN || size(this.province_scope) > 0"
  };
}

// ...
message GetUserRolesResponse {
  // ...
  uint64 user_id = 1;

  // ...
  repeated RoleAssignment assignments = 2 [(buf.validate.field).repeated.max_items = 10];

  // ...
  repeated Permission effective_permissions = 3 [(buf.validate.field).repeated.max_items = 50];

  // ...
  Role highest_role = 4;
}

// ...
message AssignRoleRequest {
  // ...
  uint64 target_user_id = 1 [(buf.validate.field).uint64.gt = 0];

  // ...
  Role role = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // ...
  string reason = 3 [(buf.validate.field).string = {
    min_len: 10
    max_len: 512
  }];

  // ...
  google.protobuf.Timestamp expires_at = 4;

  // ...
  repeated uint32 province_scope = 5 [(buf.validate.field).repeated = {
    max_items: 32
    items: {
      uint32: {
        gte: 1
        lte: 32
      }
    }
  }];

  // ...
  common.v1.IdempotencyKey idempotency_key = 6;

  // ...
  common.v1.HighSecurityToken high_security_token = 7;
}

// ...
message AssignRoleResponse {
  // ...
  RoleAssignment assignment = 1;
}

// ...
message RemoveRoleRequest {
  // ...
  uint64 target_user_id = 1 [(buf.validate.field).uint64.gt = 0];

  // ...
  Role role = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // ...
  string reason = 3 [(buf.validate.field).string = {
    min_len: 10
    max_len: 512
  }];

  // ...
  common.v1.IdempotencyKey idempotency_key = 4;

  // ...
  common.v1.HighSecurityToken high_security_token = 5;
}

// ...
message RemoveRoleResponse {
  // ...
  google.protobuf.Timestamp removed_at = 1;
}

// ...
message ListAssignableRolesRequest {}

// ...
message ListAssignableRolesResponse {
  // ...
  repeated RoleDefinition roles = 1 [(buf.validate.field).repeated.max_items = 10];

  // ...
  message RoleDefinition {
    // ...
    Role role = 1;

    // ...
    string description = 2 [(buf.validate.field).string.max_len = 256];

    // ...
    repeated Permission permissions = 3 [(buf.validate.field).repeated.max_items = 50];

    // ...
    bool requires_geo_scope = 4;
  }
}

// ...
message GetUserRolesRequest {
  // ...
  optional uint64 target_user_id = 1;
}
