syntax = "proto3";
package domains.auth.v1;

import "buf/validate/validate.proto";
import "common/v1/pagination.proto";
import "common/v1/types.proto";
import "google/protobuf/any.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message SessionInfo {
  optional int64 id = 1;
  optional string device_id = 2 [(buf.validate.field).string.max_len = 128];
  optional string device_name = 3 [(buf.validate.field).string.max_len = 68];
  optional common.v1.Platform platform = 4;
  optional string ip_address = 5 [(buf.validate.field).string.max_len = 45];
  optional string location = 6 [(buf.validate.field).string.max_len = 128];
  optional string user_agent = 7 [(buf.validate.field).string.max_len = 256];
  optional google.protobuf.Timestamp created_at = 8;
  optional google.protobuf.Timestamp last_active_at = 9;
  optional google.protobuf.Timestamp expires_at = 10;
  optional bool is_active = 11;
  optional bool is_current = 12;
}

message RevokeSessionRequest {
  optional uint64 session_id = 1;

  enum Reason {
    REASON_UNSPECIFIED = 0;
    REASON_USER_INITIATED = 1;
    REASON_SECURITY_BREACH = 2;
    REASON_DEVICE_LOST = 3;
    REASON_ADMIN_ACTION = 4;
  }
  optional Reason reason = 2;

  optional string idempotency_key = 3 [(buf.validate.field).string.max_len = 64];
}

message RevokeAllResponse {
  optional uint32 revoked_count = 1;
  optional google.protobuf.Timestamp revoked_at = 2;
}

service SessionService {
  rpc List(common.v1.CursorPagination) returns (SessionListResponse);
  rpc Revoke(RevokeSessionRequest) returns (google.protobuf.Empty);
  rpc RevokeAllExceptCurrent(google.protobuf.Empty) returns (RevokeAllResponse);
}

message SessionListResponse {
  repeated SessionInfo sessions = 1;
  optional common.v1.CursorPagination pagination = 2;
}
