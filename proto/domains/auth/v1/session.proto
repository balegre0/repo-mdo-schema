syntax = "proto3";

package domains.auth.v1;

import "buf/validate/validate.proto";
import "common/v1/base.proto";
import "common/v1/pagination.proto";
import "common/v1/types.proto";
import "domains/auth/v1/types.proto";
import "google/protobuf/timestamp.proto";

// ...
service SessionService {
  // ...
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  // ...
  rpc GetCurrentSession(GetCurrentSessionRequest) returns (GetCurrentSessionResponse);
  // ...
  rpc RevokeSession(RevokeSessionRequest) returns (RevokeSessionResponse);
  // ...
  rpc RevokeAllSessions(RevokeAllSessionsRequest) returns (RevokeAllSessionsResponse);
  // ...
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
}

// ...
message SessionToken {
  // ...
  string access_token = 1 [(buf.validate.field).string.min_len = 32];

  // ...
  string refresh_token = 2 [(buf.validate.field).string.min_len = 32];

  // ...
  google.protobuf.Timestamp access_expires_at = 3;

  // ...
  google.protobuf.Timestamp refresh_expires_at = 4;

  // ...
  repeated Permission permissions = 5 [(buf.validate.field).repeated.max_items = 50];

  // ...
  common.v1.VerifiedLevel verified_level = 6;
}

// ...
message Session {
  // ...
  uint64 id = 1;

  // ...
  string device_id = 2 [(buf.validate.field).string.max_len = 128];

  // ...
  string device_name = 3 [(buf.validate.field).string.max_len = 128];

  // ...
  common.v1.Platform platform = 4 [(buf.validate.field).enum.defined_only = true];

  // ...
  string ip_address = 5 [(buf.validate.field).string.max_len = 45];

  // ...
  string location = 6 [(buf.validate.field).string.max_len = 128];

  // ...
  string user_agent = 7 [(buf.validate.field).string.max_len = 256];

  // ...
  google.protobuf.Timestamp created_at = 8;

  // ...
  google.protobuf.Timestamp last_active_at = 9;

  // ...
  google.protobuf.Timestamp expires_at = 10;

  // ...
  bool is_current = 11;
}

// ...
message GetCurrentSessionResponse {
  // ...
  Session session = 1;
}

// ...
message ListSessionsRequest {
  // ...
  common.v1.CursorPagination pagination = 1;

  // ...
  bool include_inactive = 2;
}

// ...
message ListSessionsResponse {
  // ...
  repeated Session sessions = 1 [(buf.validate.field).repeated.max_items = 50];

  // ...
  common.v1.CursorPaginationResponse pagination = 2;
}

// ...
message RevokeSessionRequest {
  // ...
  enum RevokeReason {
    // ...
    REVOKE_REASON_UNSPECIFIED = 0;
    // ...
    REVOKE_REASON_USER_INITIATED = 1;
    // ...
    REVOKE_REASON_SECURITY_BREACH = 2;
    // ...
    REVOKE_REASON_DEVICE_LOST = 3;
    // ...
    REVOKE_REASON_ADMIN_ACTION = 4;
  }

  // ...
  uint64 session_id = 1 [(buf.validate.field).uint64.gt = 0];

  // ...
  RevokeReason reason = 2 [(buf.validate.field).enum.defined_only = true];
}

// ...
message RevokeSessionResponse {
  // ...
  google.protobuf.Timestamp revoked_at = 1;
}

// ...
message RevokeAllSessionsRequest {
  // ...
  bool exclude_current = 1;
}

// ...
message RevokeAllSessionsResponse {
  // ...
  uint32 revoked_count = 1;

  // ...
  google.protobuf.Timestamp revoked_at = 2;
}

// ...
message RefreshTokenRequest {
  // ...
  string refresh_token = 1 [(buf.validate.field).string = {
    min_len: 32
    max_len: 512
  }];

  // ...
  string device_id = 2 [(buf.validate.field).string.max_len = 128];
}

// ...
message RefreshTokenResponse {
  // ...
  SessionToken token = 1;
}

// ...
message GetCurrentSessionRequest {}
