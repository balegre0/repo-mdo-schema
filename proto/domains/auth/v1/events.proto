// LoginEvent maps metrics logging access control handshakes passing API entry barriers.
message LoginEvent {
  // FailureReason catalogs authorization block criteria or credential validation breakdowns.
  enum FailureReason {
    // Unassigned state logging zero errors.
    FAILURE_REASON_UNSPECIFIED = 0;
    // Password tracking bytes mismatch target value metrics inside cryptographic stores.
    FAILURE_REASON_INVALID_PASSWORD = 1;
    // Access denied because automated brute force protection engines locked current profile structures.
    FAILURE_REASON_ACCOUNT_LOCKED = 2;
    // Primary factors match cleared, but verification engine requires secondary token processing steps.
    FAILURE_REASON_MFA_REQUIRED = 3;
    // Security token validation failed target parameter checking rules inside MFA modules.
    FAILURE_REASON_INVALID_MFA = 4;
    // Connection tracking aborted because endpoint hit transaction volume limit constraints.
    FAILURE_REASON_RATE_LIMITED = 5;
    // Target identifying access string cannot be mapped onto active profile tables.
    FAILURE_REASON_ACCOUNT_NOT_FOUND = 6;
    // Administrative hold applied. Profile isolated due to system violations or fraud risks.
    FAILURE_REASON_ACCOUNT_SUSPENDED = 7;
  }

  // Database tracking identifier tracing the user profile entity attempting connection handshakes.
  uint64 user_id = 1;

  // Database tracking identifier indexing the persistent device session generated upon success.
  uint64 session_id = 2;

  // System execution time tracing entry inside security routing filters.
  google.protobuf.Timestamp timestamp = 3;

  // Operational validation status check flag tracking if the connection handshake succeeded completely.
  bool success = 4;

  // Diagnostic error category logging precise reasons behind access denial exceptions.
  FailureReason failure_reason = 5 [(buf.validate.field).enum.defined_only = true];

  // Network connection string mapping source interface IP routing tracks.
  string ip_address = 6 [(buf.validate.field).string.max_len = 45];

  // Physical environment hardware mapping index code tracking platform fingerprints.
  string device_id = 7 [(buf.validate.field).string.max_len = 128];

  // Software framework environment taxonomy classification mapping communication source styles.
  common.v1.Platform platform = 8 [(buf.validate.field).enum.defined_only = true];

  // Analytics threat parameter flag. True flags an unrecorded hardware environment configuration tracking history.
  bool is_new_device = 9;

  // Verifiable cryptographic event ledger block guaranteeing data history immutability.
  common.v1.MerkleEvent merkle = 10;
}

