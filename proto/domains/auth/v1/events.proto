syntax = "proto3";
package domains.auth.v1;

import "buf/validate/validate.proto";
import "common/v1/base.proto";
import "common/v1/security.proto";
import "common/v1/types.proto";
import "domains/auth/v1/roles.proto";
import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

message UserRegisteredEvent {
  optional uint32 version = 1;
  optional uint64 user_id = 2;
  optional string email = 3 [(buf.validate.field).string.max_len = 256];
  optional string phone = 4 [(buf.validate.field).string.max_len = 16];
  optional google.protobuf.Timestamp timestamp = 5;
  optional string device_id = 6 [(buf.validate.field).string.max_len = 128];
  optional string ip_address = 7 [(buf.validate.field).string.max_len = 45];
  optional common.v1.Platform platform = 8;

  enum VerificationMethod {
    VERIFICATION_METHOD_UNSPECIFIED = 0;
    VERIFICATION_METHOD_CEDULA = 1;
    VERIFICATION_METHOD_EMAIL = 2;
    VERIFICATION_METHOD_PHONE = 3;
  }
  optional VerificationMethod verification_method = 9;

  optional common.v1.MerkleEvent event = 10;
}

message UserVerifiedEvent {
  optional uint32 version = 1;
  optional uint64 user_id = 2;
  optional common.v1.VerifiedLevel previous_level = 3;
  optional common.v1.VerifiedLevel new_level = 4;
  optional uint64 verification_id = 5;
  optional google.protobuf.Timestamp timestamp = 6;

  enum Method {
    METHOD_UNSPECIFIED = 0;
    METHOD_CEDULA_OTP = 1;
    METHOD_BIOMETRIC = 2;
    METHOD_ADMIN_OVERRIDE = 3;
  }
  optional Method method = 7;

  optional common.v1.MerkleEvent merkle = 8;
}

message LoginEvent {
  optional uint32 version = 1;
  optional uint64 user_id = 2;
  optional uint64 session_id = 3;
  optional google.protobuf.Timestamp timestamp = 4;
  optional bool success = 5;

  enum FailureReason {
    FAILURE_REASON_UNSPECIFIED = 0;
    FAILURE_REASON_NONE = 1;
    FAILURE_REASON_INVALID_PASSWORD = 2;
    FAILURE_REASON_EXPIRED_TOKEN = 3;
    FAILURE_REASON_ACCOUNT_LOCKED = 4;
    FAILURE_REASON_MFA_REQUIRED = 5;
    FAILURE_REASON_INVALID_MFA = 6;
    FAILURE_REASON_RATE_LIMITED = 7;
    FAILURE_REASON_ACCOUNT_NOT_FOUND = 8;
  }
  optional FailureReason failure_reason = 6;

  optional string ip_address = 7 [(buf.validate.field).string.max_len = 45];
  optional string device_id = 8 [(buf.validate.field).string.max_len = 128];
  optional common.v1.Platform platform = 9;
  optional common.v1.MerkleEvent merkle = 10;
}

message SessionRevokedEvent {
  optional uint32 version = 1;
  optional uint64 user_id = 2;
  optional uint64 session_id = 3;
  optional string device_id = 4 [(buf.validate.field).string.max_len = 128];
  optional google.protobuf.Timestamp revoked_at = 5;

  enum RevokedBy {
    REVOKED_BY_UNSPECIFIED = 0;
    REVOKED_BY_USER = 1;
    REVOKED_BY_ADMIN = 2;
    REVOKED_BY_SYSTEM = 3;
    REVOKED_BY_SECURITY = 4;
  }
  optional RevokedBy revoked_by = 6;

  optional string reason = 7 [(buf.validate.field).string.max_len = 256];
  optional common.v1.MerkleEvent merkle = 8;
}

message RoleChangedEvent {
  optional uint32 version = 1;
  optional uint64 user_id = 2;
  optional Role.RoleName old_role = 3;
  optional Role.RoleName new_role = 4;
  optional uint64 changed_by = 5;
  optional google.protobuf.Timestamp timestamp = 6;
  optional string reason = 7 [(buf.validate.field).string.max_len = 256];
  optional bool is_temporary = 8;
  optional google.protobuf.Timestamp expires_at = 9;
  optional common.v1.MerkleEvent merkle = 10;
}

message AccountLockedEvent {
  optional uint32 version = 1;
  optional uint32 user_id = 2;
  optional google.protobuf.Timestamp locked_at = 3;
  optional google.protobuf.Timestamp locked_until = 4;

  enum LockReason {
    LOCK_REASON_UNSPECIFIED = 0;
    LOCK_REASON_TOO_MANY_ATTEMPTS = 1;
    LOCK_REASON_SUSPICIOUS_ACTIVITY = 2;
    LOCK_REASON_ADMIN_ACTION = 3;
    LOCK_REASON_BREACH_DETECTED = 4;
  }
  optional LockReason reason = 5;

  optional uint32 attempt_count = 6;
  oneof triggered_by {
    bool failed_count = 7;
    string admin_action = 8 [(buf.validate.field).string.max_len = 256];
    string security_alert = 9 [(buf.validate.field).string.max_len = 256];
  }
  optional common.v1.MerkleEvent merkle = 10;
}

message MfaChangedEvent {
  optional uint32 version = 1;
  optional uint64 user_id = 2;
  optional bool enabled = 3;

  enum Method {
    METHOD_UNSPECIFIED = 0;
    METHOD_TOTP = 1;
    METHOD_SMS = 2;
    METHOD_EMAIL = 3;
    METHOD_BACKUP_CODE = 4;
  }
  optional Method method = 4;

  optional google.protobuf.Timestamp timestamp = 5;
  optional uint64 changed_by = 6;
  optional common.v1.MerkleEvent merkle = 7;
}
