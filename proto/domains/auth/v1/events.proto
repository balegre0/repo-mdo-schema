syntax = "proto3";

package domains.auth.v1;

import "buf/validate/validate.proto";
import "common/v1/base.proto";
import "common/v1/crypto.proto";
import "common/v1/security.proto";
import "common/v1/types.proto";
import "domains/auth/v1/types.proto";
import "google/protobuf/timestamp.proto";

option go_package = "buf.build/mejorando/api/gen/go/domains/auth/v1;authv1";

// ...
message UserRegisteredEvent {
  // ...
  enum VerificationMethod {
    // ...
    VERIFICATION_METHOD_UNSPECIFIED = 0;

    // ...
    VERIFICATION_METHOD_CEDULA = 1;
    // ...
    VERIFICATION_METHOD_EMAIL = 2;
  }

  // ...
  uint64 user_id = 1;

  // ...
  string email = 2 [(buf.validate.field).string.max_len = 254];

  // ...
  common.v1.DominicanPhone phone = 3;

  // ...
  google.protobuf.Timestamp timestamp = 4;

  // ...
  string device_id = 5 [(buf.validate.field).string.max_len = 128];

  // ...
  string ip_address = 6 [(buf.validate.field).string.max_len = 45];

  // ...
  common.v1.Platform platform = 7 [(buf.validate.field).enum.defined_only = true];

  // ...
  VerificationMethod verification_method = 8 [(buf.validate.field).enum.defined_only = true];

  // ...
  common.v1.MerkleEvent merkle = 9;
}

// ...
message UserVerifiedEvent {
  // ...
  enum VerificationMethod {
    // ...
    VERIFICATION_METHOD_UNSPECIFIED = 0;

    // ...
    VERIFICATION_METHOD_CEDULA_OTP = 1;
    // ...
    VERIFICATION_METHOD_BIOMETRIC = 2;
    // ...
    VERIFICATION_METHOD_ADMIN_OVERRIDE = 3;
  }

  // ...
  uint64 user_id = 1;

  // ...
  common.v1.VerifiedLevel previous_level = 2 [(buf.validate.field).enum.defined_only = true];

  // ...
  common.v1.VerifiedLevel new_level = 3 [(buf.validate.field).enum.defined_only = true];

  // ...
  uint64 verification_id = 4;

  // ...
  google.protobuf.Timestamp timestamp = 5;

  // ...
  VerificationMethod method = 6 [(buf.validate.field).enum.defined_only = true];

  // ...
  common.v1.MerkleEvent merkle = 7;
}

// ...
message LoginEvent {
  // ...
  enum FailureReason {
    // ...
    FAILURE_REASON_UNSPECIFIED = 0;

    // ...
    FAILURE_REASON_INVALID_PASSWORD = 1;
    // ...
    FAILURE_REASON_ACCOUNT_LOCKED = 2;
    // ...
    FAILURE_REASON_MFA_REQUIRED = 3;
    // ...
    FAILURE_REASON_INVALID_MFA = 4;
    // ...
    FAILURE_REASON_RATE_LIMITED = 5;
    // ...
    FAILURE_REASON_ACCOUNT_NOT_FOUND = 6;
    // ...
    FAILURE_REASON_ACCOUNT_SUSPENDED = 7;
  }

  // ...
  uint64 user_id = 1;

  // ...
  uint64 session_id = 2;

  // ...
  google.protobuf.Timestamp timestamp = 3;

  // ...
  bool success = 4;

  // ...
  FailureReason failure_reason = 5 [(buf.validate.field).enum.defined_only = true];

  // ...
  string ip_address = 6 [(buf.validate.field).string.max_len = 45];

  // ...
  string device_id = 7 [(buf.validate.field).string.max_len = 128];

  // ...
  common.v1.Platform platform = 8 [(buf.validate.field).enum.defined_only = true];

  // ...
  bool is_new_device = 9;

  // ...
  common.v1.MerkleEvent merkle = 10;
}

// ...
message SessionRevokedEvent {
  // ...
  enum RevokedBy {
    // ...
    REVOKED_BY_UNSPECIFIED = 0;

    // ...
    REVOKED_BY_USER = 1;
    // ...
    REVOKED_BY_ADMIN = 2;
    // ...
    REVOKED_BY_SYSTEM = 3;
    // ...
    REVOKED_BY_SECURITY = 4;
  }

  // ...
  uint64 user_id = 1;

  // ...
  uint64 session_id = 2;

  // ...
  string device_id = 3 [(buf.validate.field).string.max_len = 128];

  // ...
  google.protobuf.Timestamp revoked_at = 4;

  // ...
  RevokedBy revoked_by_type = 5 [(buf.validate.field).enum.defined_only = true];

  // ...
  uint64 revoked_by_user_id = 6;

  // ...
  string reason = 7 [(buf.validate.field).string.max_len = 512];

  // ...
  common.v1.MerkleEvent merkle = 8;
}

// ...
message RoleChangedEvent {
  // ...
  uint64 user_id = 1;

  // ...
  Role old_role = 2 [(buf.validate.field).enum.defined_only = true];

  // ...
  Role new_role = 3 [(buf.validate.field).enum.defined_only = true];

  // ...
  uint64 changed_by = 4;

  // ...
  google.protobuf.Timestamp timestamp = 5;

  // ...
  string reason = 6 [(buf.validate.field).string.max_len = 512];

  // ...
  bool is_temporary = 7;

  // ...
  google.protobuf.Timestamp expires_at = 8;

  // ...
  repeated uint32 province_scope = 9 [(buf.validate.field).repeated.max_items = 32];

  // ...
  common.v1.MerkleEvent merkle = 10;
}

// ...
message AccountLockedEvent {
  // ...
  enum LockReason {
    // ...
    LOCK_REASON_UNSPECIFIED = 0;

    // ...
    LOCK_REASON_TOO_MANY_ATTEMPTS = 1;
    // ...
    LOCK_REASON_SUSPICIOUS_ACTIVITY = 2;
    // ...
    LOCK_REASON_ADMIN_ACTION = 3;
    // ...
    LOCK_REASON_BREACH_DETECTED = 4;
  }

  // ...
  uint64 user_id = 1;

  // ...
  google.protobuf.Timestamp locked_at = 2;

  // ...
  google.protobuf.Timestamp locked_until = 3;

  // ...
  LockReason reason = 4 [(buf.validate.field).enum.defined_only = true];

  // ...
  uint32 attempt_count = 5;

  // ...
  common.v1.MerkleEvent merkle = 6;
}

// ...
message MfaChangedEvent {
  // ...
  uint64 user_id = 1;

  // ...
  bool enabled = 2;

  // ...
  MfaMethod method = 3 [(buf.validate.field).enum.defined_only = true];

  // ...
  google.protobuf.Timestamp timestamp = 4;

  // ...
  uint64 changed_by = 5;

  // ...
  common.v1.MerkleEvent merkle = 6;
}

// ...
message PasswordChangedEvent {
  // ...
  uint64 user_id = 1;

  // ...
  google.protobuf.Timestamp timestamp = 2;

  // ...
  string ip_address = 3 [(buf.validate.field).string.max_len = 45];

  // ...
  bool was_reset = 4;

  // ...
  bool all_sessions_revoked = 5;

  // ...
  common.v1.MerkleEvent merkle = 6;
}
