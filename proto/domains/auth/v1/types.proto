syntax = "proto3";

package domains.auth.v1;

// Role defines systemic clearance tiers across the platform execution environment.
enum Role {
  // Default uninitialized tier. Denies all implicit platform access blocks.
  ROLE_UNSPECIFIED = 0;
  // Standard end-user. Restricted strictly to self-owned resource spaces.
  ROLE_CITIZEN = 1;
  // Field agent authorized to execute state and physical telemetry validations.
  ROLE_VALIDATOR = 2;
  // Tactical administrator handling high-criticality real-time cluster overrides.
  ROLE_EMERGENCY_ADMIN = 3;
  // Regional manager controlling data routing configurations within assigned scopes.
  ROLE_GOV_MANAGER = 4;
  // Master structural controller. Bypasses all validation and isolation barriers.
  ROLE_SUPER_ADMIN = 5;
}

// Permission isolates granular cryptographic and logical capabilities across microservices.
enum Permission {
  // Default unassigned capability token fallback.
  PERMISSION_UNSPECIFIED = 0;
  // Allows ingestion and creation of new telemetry incident frames.
  PERMISSION_REPORT_CREATE = 1;
  // Allows read access over public or explicitly scoped incident details.
  PERMISSION_REPORT_READ = 2;
  // Allows logical state mutations inside active incident workflows.
  PERMISSION_REPORT_UPDATE = 3;
  // Hard/soft removal validation authority over incident metadata.
  PERMISSION_REPORT_DELETE = 4;
  // Cryptographic or physical authorization of verified field assets.
  PERMISSION_REPORT_VERIFY = 5;
  // Manual dispatch or allocation of incidents to field nodes.
  PERMISSION_REPORT_ASSIGN = 6;
  // Content sanitization, censorship, or structural masking of data fields.
  PERMISSION_REPORT_MODERATE = 7;
  // Triggers immediate multi-node emergency notification and routing sequences.
  PERMISSION_EMERGENCY_DISPATCH = 8;
  // Globally exposes high-criticality incident tables bypassing geolocation masks.
  PERMISSION_EMERGENCY_VIEW_ALL = 9;
  // Grants lookup permission over user profiles and structural identity tables.
  PERMISSION_USER_VIEW = 10;
  // Allows total logical exclusion of identity assets from edge entry routers.
  PERMISSION_USER_BAN = 11;
  // Grants role modification access over targets equal or below active roles.
  PERMISSION_USER_ASSIGN_ROLE = 12;
  // Allows execution of analytical aggregations over metrics engines.
  PERMISSION_STATS_VIEW = 13;
  // Authorizes extraction of bulk raw metrics datasets to cold storage pools.
  PERMISSION_STATS_EXPORT = 14;
  // Allows real-time hot mutations of platform operational system variables.
  PERMISSION_SYSTEM_CONFIG = 15;
  // Grants low-level read capabilities over microservice log streams.
  PERMISSION_SYSTEM_LOGS = 16;
  // Exposes core ledger accounting structures and financial entries.
  PERMISSION_BILLING_VIEW = 17;
  // Permits structural updates, refunds, or reversals on billing engines.
  PERMISSION_BILLING_MANAGE = 18;
  // Exposes tamper-proof append-only cryptographic event logs.
  PERMISSION_AUDIT_READ = 19;
  // Authorizes management and key-rotation sweeps on outbound webhook grids.
  PERMISSION_WEBHOOK_MANAGE = 20;
}

// MfaMethod defines active secondary verification factors mapped to the user asset.
enum MfaMethod {
  // Default zero state indicator. Identifies a missing or disabled MFA strategy.
  MFA_METHOD_UNSPECIFIED = 0;
  // Time-based One-Time Password algorithm running over RFC 6238 specifications.
  MFA_METHOD_TOTP = 1;
  // Telephony short-message-service delivery channel token validation.
  MFA_METHOD_SMS = 2;
  // Electronic mail delivery channel token validation.
  MFA_METHOD_EMAIL = 3;
  // Static high-entropy cryptographic recovery secrets generated during initial setup passes.
  MFA_METHOD_BACKUP_CODE = 4;
}

// AccountStatus controls lifecycle evaluation phases enforced at application routing entry layers.
enum AccountStatus {
  // Uninitialized state placeholder mapping an untracked profile.
  ACCOUNT_STATUS_UNSPECIFIED = 0;
  // Registration parameters ingested successfully, waiting for primary factor validation layers.
  ACCOUNT_STATUS_PENDING = 1;
  // Profile functional and fully cleared to execute standard transactions on nodes.
  ACCOUNT_STATUS_ACTIVE = 2;
  // Operational hold applied. Traffic rejected temporarily awaiting administrative manual remediation.
  ACCOUNT_STATUS_SUSPENDED = 3;
  // Terminally excluded profile. Identity and device parameters blacklisted across all routers.
  ACCOUNT_STATUS_BANNED = 4;
  // Logically purged account structure. Retained inside isolation storage until data lifespan bounds clear.
  ACCOUNT_STATUS_DELETED = 5;
}

// PendingAction models mandatory identity milestones required before profile status transitions to ACTIVE.
enum PendingAction {
  // Uninitialized task entry.
  PENDING_ACTION_UNSPECIFIED = 0;
  // Demands explicit out-of-band email verification key matching loops.
  PENDING_ACTION_VERIFY_EMAIL = 1;
  // Core profile parameters missing (e.g., legal registration structures unassigned).
  PENDING_ACTION_COMPLETE_PROFILE = 2;
  // Strict systemic policy mandate demanding activation of at least one valid MfaMethod factor.
  PENDING_ACTION_ENABLE_MFA = 3;
  // Requires explicit user signature affirmation over legal and data privacy declarations.
  PENDING_ACTION_ACCEPT_TERMS = 4;
}
