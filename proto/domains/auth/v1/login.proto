syntax = "proto3";

package domains.auth.v1;

import "buf/validate/validate.proto";
import "common/v1/base.proto";
import "common/v1/crypto.proto";
import "common/v1/types.proto";
import "domains/auth/v1/session.proto";
import "domains/auth/v1/types.proto";
import "google/protobuf/timestamp.proto";

// ...
service LoginService {
  // ...
  rpc Login(LoginRequest) returns (LoginResponse);
  // ...
  rpc MfaChallenge(MfaChallengeRequest) returns (MfaChallengeResponse);
  // ...
  rpc RequestMagicLink(RequestMagicLinkRequest) returns (RequestMagicLinkResponse);
  // ...
  rpc GetBiometricChallenge(GetBiometricChallengeRequest) returns (GetBiometricChallengeResponse);
  // ...
  rpc Logout(LogoutRequest) returns (LogoutResponse);
}

// ...
message LoginCredential {
  // ...
  oneof method {
    // ...
    EmailPassword email_password = 1;
    // ...
    Biometric biometric = 2;
    // ...
    string magic_link = 3;
  }

  // ...
  message EmailPassword {
    // ...
    string email = 1 [(buf.validate.field).string = {
      email: true
      max_len: 254
    }];

    // ...
    bytes password_hash = 2 [(buf.validate.field).bytes = {
      min_len: 32
      max_len: 64
    }];
  }

  // ...
  message Biometric {
    // ...
    bytes signed_challenge = 1 [(buf.validate.field).bytes = {
      min_len: 64
      max_len: 72
    }];

    // ...
    string public_key_id = 2 [(buf.validate.field).string = {
      min_len: 1
      max_len: 64
    }];

    // ...
    bytes challenge_nonce = 3 [(buf.validate.field).bytes = {
      min_len: 32
      max_len: 64
    }];
  }
}

// ...
message LoginRequest {
  // ...
  LoginCredential credential = 1;

  // ...
  string device_id = 2 [(buf.validate.field).string.max_len = 128];

  // ...
  string ip_address = 3 [(buf.validate.field).string.max_len = 45];

  // ...
  common.v1.ClientMetadata client_metadata = 4;

  // ...
  string idempotency_key = 5 [(buf.validate.field).string = {
    min_len: 16
    max_len: 64
  }];
}

// ...
message LoginResponse {
  // ...
  oneof result {
    // ...
    Success success = 1;
    // ...
    MfaRequired mfa_required = 2;
  }

  // ...
  message Success {
    // ...
    SessionToken token = 1;

    // ...
    repeated PendingAction pending_actions = 2 [(buf.validate.field).repeated = {
      max_items: 8
      items: {
        enum: {defined_only: true}
      }
    }];

    // ...
    bool is_new_device = 3;
  }

  // ...
  message MfaRequired {
    // ...
    string provisional_token = 1 [(buf.validate.field).string = {
      min_len: 32
      max_len: 64
    }];

    // ...
    repeated MfaMethod available_methods = 2 [(buf.validate.field).repeated.max_items = 4];

    // ...
    google.protobuf.Timestamp expires_at = 3;
  }
}

// ...
message MfaChallengeRequest {
  // ...
  string provisional_token = 1 [(buf.validate.field).string = {
    min_len: 32
    max_len: 64
  }];

  // ...
  MfaMethod method = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];

  // ...
  string code = 3 [(buf.validate.field).string = {
    min_len: 6
    max_len: 8
  }];

  // ...
  option (buf.validate.message).cel = {
    id: "mfa.code_format_by_method"
    message: "TOTP code must be 6 digits"
    expression: "this.method != domains.auth.v1.MfaMethod.MFA_METHOD_TOTP || this.code.matches('^[0-9]{6}$')"
  };
}

// ...
message MfaChallengeResponse {
  // ...
  SessionToken token = 1;

  // ...
  repeated PendingAction pending_actions = 2 [(buf.validate.field).repeated = {
    max_items: 8
    items: {
      enum: {defined_only: true}
    }
  }];
}

// ...
message RequestMagicLinkRequest {
  // ...
  string email = 1 [(buf.validate.field).string = {
    email: true
    max_len: 254
  }];

  // ...
  string redirect_url = 2 [(buf.validate.field).string = {
    pattern: "^https://"
    max_len: 512
  }];

  // ...
  string device_id = 3 [(buf.validate.field).string.max_len = 128];
}

// ...
message RequestMagicLinkResponse {
  // ...
  bool sent = 1;

  // ...
  google.protobuf.Timestamp expires_at = 2;
}

// ...
message GetBiometricChallengeRequest {
  // ...
  string device_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
}

// ...
message GetBiometricChallengeResponse {
  // ...
  bytes challenge = 1 [(buf.validate.field).bytes = {
    min_len: 32
    max_len: 64
  }];

  // ...
  google.protobuf.Timestamp expires_at = 2;
}

// ...
message LogoutRequest {
  // ...
  bool revoke_all_sessions = 1;
}

// ...
message LogoutResponse {
  // ...
  google.protobuf.Timestamp logged_out_at = 1;

  // ...
  uint32 sessions_revoked = 2;
}
