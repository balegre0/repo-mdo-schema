syntax = "proto3";
package domains.auth.v1;

import "buf/validate/validate.proto";
import "common/v1/crypto.proto";
import "common/v1/security.proto";
import "google/protobuf/timestamp.proto";

message Cedula {
  optional string number = 1 [(buf.validate.field).string = {
    pattern: "^[0-9]{3}\\-?[0-9]{7}\\-?[0-9]{1}$"
    max_len: 13
  }];
  optional string normalized = 2 [(buf.validate.field).string = {
    pattern: "^[0-9]{11}$"
    max_len: 11
  }];
  optional string verified_name = 3 [(buf.validate.field).string.max_len = 64];
  optional string verified_last_name = 4 [(buf.validate.field).string.max_len = 64];
  optional string verified_maternal_last_name = 5 [(buf.validate.field).string.max_len = 64];
  optional string verified_birth_date = 6 [(buf.validate.field).string.max_len = 10];

  enum Gender {
    GENDER_UNSPECIFIED = 0;
    GENDER_MALE = 1;
    GENDER_FEMALE = 2;
  }
  optional Gender verified_gender = 7;

  optional string verified_nationality = 8 [(buf.validate.field).string.max_len = 32];
  optional common.v1.Hash verification_hash = 9;
  optional common.v1.Hash blind_index = 10;
}

message StartVerificationRequest {
  optional string cedula = 1 [(buf.validate.field).string = {
    pattern: "^[0-9]{3}\\-?[0-9]{7}\\-?[0-9]{1}$"
    max_len: 13
  }];
  optional string full_name = 2 [(buf.validate.field).string.max_len = 64];
  optional string date_of_birth = 3 [(buf.validate.field).string = {
    pattern: "^\\d{4}-\\d{2}-\\d{2}$" // YYYY-MM-DD
    max_len: 10
  }];
  optional string maternal_last_name = 4 [(buf.validate.field).string.max_len = 64];
  optional string paternal_last_name = 5 [(buf.validate.field).string.max_len = 64];
  optional string device_id = 6 [(buf.validate.field).string.max_len = 128];
  optional string ip_address = 7 [(buf.validate.field).string.max_len = 45];
  optional string client_version = 8 [(buf.validate.field).string.max_len = 32];
  optional string client_nonce = 9 [(buf.validate.field).string.max_len = 64];
  optional common.v1.ZKProof zk_proof = 10;
  optional common.v1.Hash blind_index = 11;
  optional string idempotency_key = 12 [(buf.validate.field).string.max_len = 64];
}

message StartVerificationResponse {
  optional uint64 verification_id = 1;

  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_PENDING = 1;
    STATUS_VERIFIED = 2;
    STATUS_MISMATCH = 3;
    STATUS_NOT_FOUND = 4;
    STATUS_IN_PROGRESS = 5;
    STATUS_EXPIRED = 6;
    STATUS_REJECTED = 7;
  }
  optional Status status = 2;

  optional bool matched_name = 3;
  optional bool matched_birth_date = 4;
  optional bool matched_maternal_last_name = 5;
  optional uint32 risk_score = 6 [(buf.validate.field).uint32.lte = 255];
  optional google.protobuf.Timestamp validated_at = 7;
  optional google.protobuf.Timestamp expires_at = 8;
  optional Cedula official_data = 9;
  optional common.v1.HighSecurityToken high_security_token = 10;

  option (buf.validate.message).cel = {
    id: "expires_after_validated"
    message: "expires_at must be after validated_at if both are set"
    expression: "!has(this.validated_at) || !has(this.expires_at) || this.expires_at > this.validated_at"
  };
}

message GetStatusRequest {
  uint64 verification_id = 1;
}

message GetStatusResponse {
  optional uint64 verification_id = 1;
  optional StartVerificationResponse.Status status = 2;

  optional bool matched_name = 3;
  optional bool matched_birth_date = 4;
  optional bool matched_maternal_last_name = 5;
  optional uint32 risk_score = 6 [(buf.validate.field).uint32.lte = 255];
  optional google.protobuf.Timestamp validated_at = 7;
  optional google.protobuf.Timestamp expires_at = 8;
  optional Cedula official_data = 9;
  optional common.v1.HighSecurityToken high_security_token = 10;
}

message VerifyOtpRequest {
  optional uint64 verification_id = 1;
  optional string code = 2 [(buf.validate.field).string = {
    min_len: 4
    max_len: 8
  }];

  enum Method {
    METHOD_UNSPECIFIED = 0;
    METHOD_SMS = 1;
    METHOD_EMAIL = 2;
    METHOD_VOICE = 3;
  }
  optional Method method = 3;
  optional uint32 attempt_count = 4 [(buf.validate.field).uint32 = {
    gte: 0
    lte: 5
  }];
}

message VerifyOtpResponse {
  optional bool valid = 1;
  optional uint32 retry_count = 2;
  optional uint32 max_retries = 3;
  optional google.protobuf.Timestamp expires_at = 4;
  optional google.protobuf.Timestamp next_attempt_at = 5;
}

message RequestOtpRequest {
  uint64 verification_id = 1;
}

message RequestOtpResponse {
  optional bool valid = 1;
  optional uint32 retry_count = 2;
  optional uint32 max_retries = 3;
  optional google.protobuf.Timestamp expires_at = 4;
  optional google.protobuf.Timestamp next_attempt_at = 5;
}

service CedulaService {
  rpc StartVerification(StartVerificationRequest) returns (StartVerificationResponse);
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc VerifyOtp(VerifyOtpRequest) returns (VerifyOtpResponse);
  rpc RequestOtp(RequestOtpRequest) returns (RequestOtpResponse);
}
